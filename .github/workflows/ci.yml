name: ci
on: [push, pull_request]
jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --frozen
      - run: pip install ruff black mypy pytest
      - run: ruff check .
      - run: black --check .
      - run: mypy .
      - run: pytest -q
